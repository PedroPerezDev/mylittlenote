<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My little note</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1108">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="My little note">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button class="nav-arrow" id="btn-prev" aria-label="Mes anterior">←</button>

  <div id="page">

    <!-- CABECERA -->
    <header id="page-header">
      <div class="page-header-left">
        <button id="btn-auth">entrar</button>
      </div>
      <h1 id="app-title">My little note<span id="app-byline" hidden>by <span id="app-username"></span></span></h1>
      <div class="page-header-right">
        <button id="btn-menu" aria-label="Menú">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
        <div id="mobile-menu" hidden>
          <button id="menu-btn-chart">Ver gráfico de ánimo</button>
          <button id="menu-btn-stats">Estadísticas</button>
        </div>
      </div>
    </header>

    <div id="page-main">

    <!-- SECCIÓN DIARIO -->
    <div id="diary-section">
      <div id="left-content">
        <h2 id="diary-month-title"></h2>
        <button id="btn-show-chart">Ver gráfico de ánimo</button>
        <button id="btn-show-stats">Estadísticas</button>
        <div id="diary-rows"></div>
      </div>
    </div>

    <!-- SEPARADOR (línea roja de margen) -->
    <div id="page-divider"></div>

    <!-- SECCIÓN HÁBITOS -->
    <div id="habits-section">
      <div id="right-content">
        <h2 id="mobile-month-title"></h2>

        <!-- Banner: copiar hábitos del mes anterior -->
        <div id="copy-habits-banner" hidden>
          <span id="copy-habits-text">¿añadir las tareas del mes anterior?</span>
          <button id="btn-copy-habits">sí</button>
        </div>

        <table id="habit-grid">
          <thead id="grid-head"></thead>
          <tbody id="grid-body"></tbody>
        </table>
        <div id="empty-state" hidden>
          <p>aún no hay hábitos</p>
          <p>pulsa <span class="inline-plus">＋</span> para añadir uno</p>
        </div>
      </div>
    </div>

    </div> <!-- /page-main -->

    <!-- FOOTER -->
    <footer id="page-footer">
      <p id="footer-text">Desarrollado por Pedro Pérez · 2026</p>
    </footer>

  </div>

  <button class="nav-arrow" id="btn-next" aria-label="Mes siguiente">→</button>

  <!-- MODAL DIARIO -->
  <div id="diary-modal" hidden>
    <div id="diary-modal-backdrop"></div>
    <div id="diary-modal-card">
      <div id="diary-modal-day-label"></div>
      <textarea id="diary-modal-text" spellcheck="false" placeholder="..."></textarea>
      <button id="diary-modal-close" class="btn-modal-close" aria-label="Cerrar">×</button>
    </div>
  </div>

  <!-- MODAL GRÁFICO DE HUMOR -->
  <div id="mood-chart-modal" hidden>
    <div id="mood-chart-backdrop"></div>
    <div id="mood-chart-card">
      <div id="mood-chart-nav">
        <button id="mood-chart-prev">←</button>
        <div id="mood-chart-title"></div>
        <button id="mood-chart-next">→</button>
      </div>
      <div id="mood-chart-svg-wrap"></div>
      <div id="mood-chart-legend">
        <span class="mood-legend-h">:) alegría</span>
        <span class="mood-legend-a">&gt;:( enfado</span>
      </div>
      <button id="mood-chart-close" class="btn-modal-close" aria-label="Cerrar">×</button>
    </div>
  </div>

  <!-- MODAL ESTADÍSTICAS -->
  <div id="stats-modal" hidden>
    <div id="stats-backdrop"></div>
    <div id="stats-card">
      <div id="stats-nav">
        <button id="stats-prev">←</button>
        <div id="stats-title"></div>
        <button id="stats-next">→</button>
      </div>
      <div id="stats-bars"></div>
      <p id="stats-message"></p>
      <button id="stats-close" class="btn-modal-close" aria-label="Cerrar">×</button>
    </div>
  </div>

  <!-- MODAL AUTH -->
  <div id="auth-modal" hidden>
    <div id="auth-backdrop"></div>
    <div id="auth-card">
      <div id="auth-user-info" hidden>
        <p id="auth-user-label">conectado como</p>
        <p id="auth-user-email"></p>
      </div>
      <div id="auth-tabs">
        <button class="auth-tab active" data-tab="login">entrar</button>
        <button class="auth-tab" data-tab="register">registrarse</button>
      </div>
      <input id="auth-name" type="text" placeholder="nombre" autocomplete="name" hidden>
      <input id="auth-email" type="email" placeholder="email" autocomplete="email">
      <div class="password-wrapper">
        <input id="auth-password" type="password" placeholder="contraseña" autocomplete="current-password">
        <button type="button" id="btn-toggle-password" class="btn-eye" aria-label="Ver contraseña">
          <svg id="eye-open" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eye-closed" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <div id="auth-error"></div>
      <button id="auth-submit">entrar</button>
      <button id="auth-logout" hidden>cerrar sesión</button>
      <button id="auth-modal-close" class="btn-modal-close" aria-label="Cerrar">×</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/mylittlenote/sw.js');
    }
  </script>
</body>
</html>
