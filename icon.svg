<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo escritorio -->
  <rect width="512" height="512" fill="#1a1108"/>

  <!-- Sombra del cuaderno -->
  <rect x="108" y="118" width="310" height="290" rx="6" fill="rgba(0,0,0,0.45)"/>

  <!-- Página del cuaderno -->
  <rect x="100" y="110" width="310" height="290" rx="4" fill="#F5EFD8"/>

  <!-- Línea roja de margen -->
  <line x1="148" y1="110" x2="148" y2="400" stroke="rgba(188,48,36,0.55)" stroke-width="2.5"/>

  <!-- Líneas de pauta -->
  <line x1="100" y1="175" x2="410" y2="175" stroke="rgba(165,140,95,0.4)" stroke-width="1.5"/>
  <line x1="100" y1="215" x2="410" y2="215" stroke="rgba(165,140,95,0.4)" stroke-width="1.5"/>
  <line x1="100" y1="255" x2="410" y2="255" stroke="rgba(165,140,95,0.4)" stroke-width="1.5"/>
  <line x1="100" y1="295" x2="410" y2="295" stroke="rgba(165,140,95,0.4)" stroke-width="1.5"/>
  <line x1="100" y1="335" x2="410" y2="335" stroke="rgba(165,140,95,0.4)" stroke-width="1.5"/>

  <!-- Texto "mln" estilo escritura a mano -->
  <text x="260" y="300"
    font-family="Georgia, serif"
    font-size="112"
    font-style="italic"
    font-weight="400"
    fill="#1c2461"
    text-anchor="middle"
    opacity="0.88">mln</text>
</svg>
