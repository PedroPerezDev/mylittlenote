<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo escritorio (ocupa todo para maskable) -->
  <rect width="512" height="512" fill="#1a1108"/>

  <!-- Sombra del cuaderno -->
  <rect x="88" y="98" width="340" height="320" rx="6" fill="rgba(0,0,0,0.45)"/>

  <!-- Página del cuaderno -->
  <rect x="80" y="90" width="340" height="320" rx="4" fill="#F5EFD8"/>

  <!-- Línea roja de margen -->
  <line x1="130" y1="90" x2="130" y2="410" stroke="rgba(188,48,36,0.55)" stroke-width="2.5"/>

  <!-- Líneas de pauta -->
  <line x1="80" y1="160" x2="420" y2="160" stroke="rgba(165,140,95,0.4)" stroke-width="1.5"/>
  <line x1="80" y1="200" x2="420" y2="200" stroke="rgba(165,140,95,0.4)" stroke-width="1.5"/>
  <line x1="80" y1="240" x2="420" y2="240" stroke="rgba(165,140,95,0.4)" stroke-width="1.5"/>
  <line x1="80" y1="280" x2="420" y2="280" stroke="rgba(165,140,95,0.4)" stroke-width="1.5"/>
  <line x1="80" y1="320" x2="420" y2="320" stroke="rgba(165,140,95,0.4)" stroke-width="1.5"/>

  <!-- Texto "mln" -->
  <text x="260" y="305"
    font-family="Georgia, serif"
    font-size="112"
    font-style="italic"
    font-weight="400"
    fill="#1c2461"
    text-anchor="middle"
    opacity="0.88">mln</text>
</svg>
